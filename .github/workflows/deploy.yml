name: CI/CD Frontend AWS

on:
  push:
    branches:
      - main # O main, dependiendo de la rama que uses

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build y Push de la imagen a ECR
        run: |
          docker build -t ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest .
          docker push ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest

      - name: Despliegue en EC2 vía AWS SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_FRONTEND_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "docker pull ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest",
              "docker stop app-frontend || true",
              "docker rm app-frontend || true",
              "docker run -d --name app-frontend -p 80:80 ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest",
              "docker image prune -f"
            ]'
